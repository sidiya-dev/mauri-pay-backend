spring:
  application:
    name: mauri-pay-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mauripay}
    username: ${DB_USER:mauripay}
    password: ${DB_PASSWORD:mauripay}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  session:
    store-type: jdbc
    jdbc:
      initialize-schema: always
    # Sessions expire after 4 minutes of inactivity (each authenticated request resets the clock).
    timeout: 4m

server:
  port: ${PORT:8080}
  servlet:
    session:
      timeout: 4m

app:
  payment:
    code-ttl-minutes: 15
  webhook:
    max-attempts: 6
    retry-base-seconds: 30
  dev:
    seed: ${APP_DEV_SEED:true}        # seeds a demo merchant + dev top-up endpoint
    seed-merchant-api-key: ${APP_DEV_MERCHANT_KEY:dev-merchant-key-please-change}
  security:
    max-failed-attempts: ${APP_MAX_FAILED_ATTEMPTS:5}   # lock after this many consecutive failures
    lock-minutes: ${APP_LOCK_MINUTES:15}                # lock duration once tripped

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId}] %logger{36} - %msg%n"
  level:
    com.mauripay.backend: INFO
    org.springframework.security: INFO

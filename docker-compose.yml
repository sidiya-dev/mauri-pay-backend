services:
  postgres:
    image: postgres:16
    container_name: mauripay-postgres
    environment:
      POSTGRES_DB: mauripay
      POSTGRES_USER: mauripay
      POSTGRES_PASSWORD: mauripay
    ports:
      - "5432:5432"
    volumes:
      - mauripay-pgdata:/var/lib/postgresql/data

volumes:
  mauripay-pgdata:
